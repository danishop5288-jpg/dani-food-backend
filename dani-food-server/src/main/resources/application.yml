server:
  port: 8080
spring:
  profiles:
    active: dev

  datasource:
    url: ${danifood.datasource.url}
    username: ${danifood.datasource.username}
    password: ${danifood.datasource.password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQL8Dialect